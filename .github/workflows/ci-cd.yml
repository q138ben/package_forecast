name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  APP_NAME: package-forecast

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run linting
        run: |
          pip install ruff
          ruff check src/ || true

      - name: Run tests
        run: |
          pytest tests/ --cov=src --cov-report=term-missing -v

      - name: Test API locally
        run: |
          python main.py forecast --location A
          python main.py forecast --location B
          python main.py forecast --location C

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker

      - name: Enable necessary APIs
        run: |
          gcloud services enable cloudbuild.googleapis.com run.googleapis.com --project $PROJECT_ID

      - name: Build and push Docker image
        run: |
          gcloud builds submit --tag gcr.io/$PROJECT_ID/$APP_NAME --project $PROJECT_ID

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $APP_NAME \
            --image gcr.io/$PROJECT_ID/$APP_NAME \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --project $PROJECT_ID

      - name: Get service URL
        run: |
          URL=$(gcloud run services describe $APP_NAME --platform managed --region $REGION --format 'value(status.url)' --project $PROJECT_ID)
          echo "Service deployed to: $URL"
          echo "SERVICE_URL=$URL" >> $GITHUB_ENV

      - name: Verify deployment
        run: |
          sleep 10
          curl -f ${{ env.SERVICE_URL }}/health || exit 1
          curl -f ${{ env.SERVICE_URL }}/ready || exit 1
